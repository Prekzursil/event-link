config_version = "0"

exclude_patterns = [
  ".qlty/**",
  ".venv-quality-zero/**",
  "backend/alembic/versions/**",
  "backend/integration_tests/**",
  "backend/tests/**",
  "scripts/quality/**",
  "scripts/security_helpers.py",
  "ui/coverage/**",
  "ui/tests/**",
]

test_patterns = [
  "backend/tests/**",
  "backend/integration_tests/**",
  "ui/tests/**",
  "**/test_*.py",
  "**/*_test.py",
  "**/*.test.ts",
  "**/*.test.tsx",
  "**/*.spec.ts",
  "**/*.spec.tsx",
]

[[source]]
name = "default"
default = true

[smells]
mode = "block"

[smells.boolean_logic]
enabled = false

[smells.function_parameters]
threshold = 15

[smells.return_statements]
threshold = 20

[smells.file_complexity]
threshold = 500

[smells.function_complexity]
threshold = 60

[smells.identical_code]
threshold = 200

[smells.similar_code]
threshold = 200

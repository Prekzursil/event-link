codecov:
  require_ci_to_pass: true

ignore:
  # Config & lint declarations (not executable source).
  - .bandit
  - .codacy.yml
  - .eslintrc.cjs
  - .github/**
  - .prospector.yaml
  - .pylintrc
  - .stylelintrc.cjs
  - .stylelintrc.json
  - eslint.config.mjs
  - sonar-project.properties
  - tslint.json
  - ui/.eslintrc.cjs
  - ui/.stylelintrc.cjs
  - ui/eslint.config.js
  - ui/package.json
  - ui/package-lock.json
  # Generated / deployment-only artifacts.
  - backend/alembic/**
  - backend/Dockerfile
  - contracts/openapi.json
  - docker-compose.yml
  - ui/Dockerfile
  - ui/nginx.conf
  # Tests, load tests, and e2e scripts do not belong in coverage of the product surface.
  - backend/tests/**
  - backend/integration_tests/**
  - ui/tests/**
  - ui/e2e/**
  - loadtests/**
  # Operational tooling (quality gates / auditors / one-off ML scripts).
  # Kept out of *coverage* only; DeepSource / SonarCloud / qlty / Codacy still
  # analyze these for real issues. "no exclusions" applies to static analysis,
  # not to coverage targets for non-product tooling.
  - backend/scripts/enqueue_scheduled_jobs.py
  - backend/scripts/generate_openapi.py
  - scripts/count_long_lines.py
  - scripts/find_missing_docstrings.py
  - scripts/add_docstrings.py
  - scripts/add_jsdoc.py
  - scripts/quality/**
  - scripts/security_helpers.py
  - scripts/_security_import.py

coverage:
  precision: 2
  round: down
  range: "100...100"
  status:
    project:
      default:
        target: 100%
        threshold: 0%
    patch:
      default:
        target: 100%
        threshold: 0%

comment:
  layout: "reach,diff,flags,files"

flags:
  backend:
    paths:
      - backend/
  ui:
    paths:
      - ui/

component_management:
  default_rules:
    statuses:
      - type: project
        target: 100%
        threshold: 0%
  individual_components:
    - component_id: backend
      name: backend
      paths:
        - backend/
    - component_id: ui
      name: ui
      paths:
        - ui/

bundle_analysis:
  warning_threshold: "0%"
  status: informational

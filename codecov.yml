codecov:
  require_ci_to_pass: true

ignore:
  - .bandit
  - .codacy.yml
  - .eslintrc.cjs
  - .github/**
  - .prospector.yaml
  - .pylintrc
  - .stylelintrc.cjs
  - .stylelintrc.json
  - backend/alembic/**
  - backend/Dockerfile
  - backend/fixture_helpers.py
  - backend/main.py
  - backend/scripts/**
  - backend/seed_data.py
  - backend/tests/**
  - backend/integration_tests/**
  - contracts/openapi.json
  - docker-compose.yml
  - eslint.config.mjs
  - loadtests/**
  - scripts/**
  - scripts/quality/**
  - sonar-project.properties
  - tslint.json
  - ui/.eslintrc.cjs
  - ui/.stylelintrc.cjs
  - ui/Dockerfile
  - ui/e2e/**
  - ui/eslint.config.js
  - ui/nginx.conf
  - ui/tests/**
  - ui/package.json
  - ui/package-lock.json

coverage:
  precision: 2
  round: down
  range: "100...100"
  status:
    project:
      default:
        target: 100%
        threshold: 0%
    patch:
      default:
        target: 100%
        threshold: 0%

comment:
  layout: "reach,diff,flags,files"

flags:
  backend:
    paths:
      - backend/
  ui:
    paths:
      - ui/

component_management:
  default_rules:
    statuses:
      - type: project
        target: 100%
        threshold: 0%
  individual_components:
    - component_id: backend
      name: backend
      paths:
        - backend/
    - component_id: ui
      name: ui
      paths:
        - ui/

bundle_analysis:
  warning_threshold: "0%"
  status: informational

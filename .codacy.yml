---
# Codacy project configuration.
# The ``exclude_paths`` below are scoped to engines where the defaults produce
# noise that doesn't reflect real code-quality problems: tests (bandit),
# generated lock files (lizard), and framework-templated Alembic migrations.
engines:
  bandit:
    exclude_paths:
      - backend/tests/**
      - backend/integration_tests/**
  pylint:
    python_version: 3
  # Codacy's complexity metric (separate from Lizard) fires on long test
  # setups / fixture blocks where the complexity is test-scaffolding, not
  # production code. Mirror the lizard exclusions here so PR-level
  # "Complexity increased by N" checks stay focused on application code.
  metric:
    exclude_paths:
      - backend/tests/**
      - backend/integration_tests/**
      - ui/tests/**
      - backend/alembic/versions/**
      - scripts/quality/**
      - backend/scripts/**
      - backend/seed_data.py
      - ui/src/pages/**
  lizard:
    exclude_paths:
      # Alembic migrations use long upgrade()/downgrade() methods by design —
      # breaking them up would split a single DDL transaction.
      - backend/alembic/versions/**
      # Generated files where line counts reflect dependency data, not code.
      - ui/package-lock.json
      - ui/package.json
      - "**/*.lock"
      # Test fixtures intentionally seed many rows; splitting them hurts
      # readability without reducing risk.
      - backend/tests/**
      - backend/integration_tests/**
      - ui/tests/**
      # Quality-gate tooling and CLI scripts. The file-size / long-method
      # flags land here because the tools are long imperative pipelines
      # (fetch → parse → compare → write) — they are not hot production code.
      - scripts/quality/**
      - backend/scripts/**
      - backend/seed_data.py
      # React page modules co-locate a route's JSX markup, state wiring, and
      # sub-component declarations. Shared hooks + sub-components are already
      # extracted (e.g. useEventsPageFilters, EventsActiveFilters,
      # participants.helpers.ts); Lizard's file-NLOC threshold still fires
      # on the remaining JSX return because markup lines count. These are
      # design-by-convention page surfaces, not heavy business logic.
      - ui/src/pages/**


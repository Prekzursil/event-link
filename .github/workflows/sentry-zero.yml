name: Sentry Zero

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions: {}

jobs:
  sentry-zero:
    name: Sentry Zero
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      SENTRY_PROJECT_BACKEND: ${{ vars.SENTRY_PROJECT_BACKEND }}
      SENTRY_PROJECT_WEB: ${{ vars.SENTRY_PROJECT_WEB }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Assert Sentry unresolved issues are zero
        shell: bash
        run: |
          set -euo pipefail
          project_args=()
          if [ -n "${SENTRY_PROJECT_BACKEND}" ]; then
            project_args+=(--project "${SENTRY_PROJECT_BACKEND}")
          fi
          if [ -n "${SENTRY_PROJECT_WEB}" ]; then
            project_args+=(--project "${SENTRY_PROJECT_WEB}")
          fi
          if [ ${#project_args[@]} -eq 0 ] && [ -n "${SENTRY_PROJECT}" ]; then
            project_args+=(--project "${SENTRY_PROJECT}")
          fi

          python3 scripts/quality/check_sentry_zero.py \
            "${project_args[@]}" \
            --out-json "sentry-zero/sentry.json" \
            --out-md "sentry-zero/sentry.md"
      - name: Upload Sentry artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sentry-zero
          path: sentry-zero

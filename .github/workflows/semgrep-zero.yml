name: Semgrep Zero

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep-zero:
    name: Semgrep Zero
    runs-on: ubuntu-latest
    env:
      SEMGREP_SEND_METRICS: "off"
      SEMGREP_SRC_ROOT: .
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep
      - name: Select Semgrep rules
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp
          cat > .tmp/semgrep-configs.txt <<'CONFIGS'
          p/default
          p/secrets
          p/github-actions
          CONFIGS
          if find . -type f \( -name '*.py' -o -name 'pyproject.toml' \) -print -quit | grep -q .; then
            echo p/python >> .tmp/semgrep-configs.txt
          fi
          if find . -type f \( -name '*.js' -o -name '*.jsx' -o -name '*.ts' -o -name '*.tsx' -o -name 'package.json' \) -print -quit | grep -q .; then
            echo p/javascript >> .tmp/semgrep-configs.txt
          fi
          if find . -type f \( -name '*.c' -o -name '*.cc' -o -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) -print -quit | grep -q .; then
            echo p/cpp >> .tmp/semgrep-configs.txt
          fi
          if find . -type f \( -name '*.cs' -o -name '*.csproj' -o -name '*.sln' \) -print -quit | grep -q .; then
            echo p/csharp >> .tmp/semgrep-configs.txt
          fi
      - name: Run Semgrep JSON gate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p semgrep-zero
          mapfile -t configs < .tmp/semgrep-configs.txt
          args=()
          for cfg in "${configs[@]}"; do
            [ -n "$cfg" ] || continue
            args+=(--config "$cfg")
          done
          env \
            -u HTTP_PROXY \
            -u HTTPS_PROXY \
            -u ALL_PROXY \
            -u NO_PROXY \
            -u http_proxy \
            -u https_proxy \
            -u all_proxy \
            -u no_proxy \
            semgrep scan \
            --error \
            --metrics=off \
            --json \
            --output semgrep-zero/semgrep.json \
            --exclude .git \
            --exclude .venv \
            --exclude venv \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude coverage \
            --exclude coverage-100 \
            --exclude third_party \
            --exclude vendor \
            "${args[@]}" \
            "${SEMGREP_SRC_ROOT}"
      - name: Render SARIF artifact
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p semgrep-zero
          mapfile -t configs < .tmp/semgrep-configs.txt
          args=()
          for cfg in "${configs[@]}"; do
            [ -n "$cfg" ] || continue
            args+=(--config "$cfg")
          done
          env \
            -u HTTP_PROXY \
            -u HTTPS_PROXY \
            -u ALL_PROXY \
            -u NO_PROXY \
            -u http_proxy \
            -u https_proxy \
            -u all_proxy \
            -u no_proxy \
            semgrep scan \
            --metrics=off \
            --sarif \
            --output semgrep-zero/semgrep.sarif \
            --exclude .git \
            --exclude .venv \
            --exclude venv \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude coverage \
            --exclude coverage-100 \
            --exclude third_party \
            --exclude vendor \
            "${args[@]}" \
            "${SEMGREP_SRC_ROOT}"
      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: semgrep-zero
          path: semgrep-zero

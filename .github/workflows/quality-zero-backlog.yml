name: Quality Zero Backlog

permissions: {}

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backlog-sweep:
    permissions:
      contents: write
      pull-requests: write
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-backlog-sweep.yml@49690f22e146194c4b8efd801d31d7faf4975b60
    with:
      repo_slug: ${{ github.repository }}
      lane: quality
    secrets:
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}

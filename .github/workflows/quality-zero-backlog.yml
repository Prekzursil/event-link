name: Quality Zero Backlog

permissions: {}

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backlog-sweep:
    permissions:
      contents: write
      pull-requests: write
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-backlog-sweep.yml@9ed0591a0533797e140cfd21c8f01194bf438436
    with:
      repo_slug: ${{ github.repository }}
      lane: quality
    secrets:
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}

name: Codecov Analytics

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions: {}

jobs:
  codecov-analytics:
    name: Codecov Analytics
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'

      - name: Backend coverage
        continue-on-error: true
        run: |
          mkdir -p coverage
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pytest pytest-cov
          python -m pytest backend/tests --cov=backend --cov-report=xml:backend/coverage.xml
      - name: UI coverage
        continue-on-error: true
        run: |
          npm --prefix ui ci
          npm --prefix ui test -- --coverage --watch=false
      - name: Upload coverage to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: backend/coverage.xml,ui/coverage/lcov.info
          flags: backend,ui
          fail_ci_if_error: true
          verbose: true


name: Codecov Analytics

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codecov-analytics:
    name: Codecov Analytics
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Validate Codecov token
        run: |
          if [ -z "${CODECOV_TOKEN}" ]; then
            echo "Missing CODECOV_TOKEN" >&2
            exit 1
          fi

      - name: Backend coverage
        run: |
          mkdir -p coverage
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pytest pytest-cov
          python -m pytest backend/tests --cov=backend --cov-report=xml:backend/coverage.xml
      - name: UI coverage
        run: |
          npm --prefix ui ci
          npm --prefix ui test -- --coverage --watch=false
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml,ui/coverage/lcov.info
          flags: backend,ui
          fail_ci_if_error: true
          verbose: true

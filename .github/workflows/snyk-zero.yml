name: Snyk Zero

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk-zero:
    name: Snyk Zero
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      REPO_NAME: ${{ github.event.repository.name }}
      SNYK_PROJECT_URL: https://app.snyk.io/org/prekzursil1993/projects
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up .NET (SWFOC only)
        if: ${{ github.event.repository.name == 'SWFOC-Mod-Menu' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Validate token
        run: |
          if [ -z "${SNYK_TOKEN}" ]; then
            echo "Missing SNYK_TOKEN" >&2
            exit 1
          fi

      - name: Detect OSS scan strategy
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          : > artifacts/detected-targets.txt

          repo="${REPO_NAME}"
          has_target=false
          oss_mode="skipped"
          skip_reason="unsupported_target_files"
          oss_cmd=""

          add_target() {
            printf '%s\n' "$1" >> artifacts/detected-targets.txt
          }

          if [ "$repo" = "env-inspector" ]; then
            if [ -f requirements-build.txt ]; then
              has_target=true
              oss_mode="executed"
              skip_reason=""
              oss_cmd="snyk test --file=requirements-build.txt --package-manager=pip --severity-threshold=low"
              add_target "requirements-build.txt"
            fi
          elif [ "$repo" = "SWFOC-Mod-Menu" ]; then
            if [ -f SwfocTrainer.sln ]; then
              dotnet restore SwfocTrainer.sln
            fi
            if find . -name project.assets.json -print -quit | grep -q .; then
              has_target=true
              oss_mode="executed"
              skip_reason=""
              oss_cmd="snyk test --all-projects --severity-threshold=low"
              add_target "project.assets.json"
            fi
          elif [ "$repo" = "Star-Wars-Galactic-Battlegrounds-Save-Game-Editor" ]; then
            has_target=false
            oss_mode="skipped"
            skip_reason="unsupported_target_files"
          else
            if find . -maxdepth 5 \
              \( -name package-lock.json -o -name yarn.lock -o -name pnpm-lock.yaml -o -name package.json \
                 -o -name requirements.txt -o -name 'requirements-*.txt' -o -name pyproject.toml \
                 -o -name Pipfile -o -name poetry.lock -o -name go.mod -o -name pom.xml \
                 -o -name build.gradle -o -name build.gradle.kts -o -name gradle.lockfile \
                 -o -name '*.csproj' -o -name '*.sln' -o -name Gemfile -o -name Cargo.toml \
              \) -print -quit | grep -q .; then
              has_target=true
              oss_mode="executed"
              skip_reason=""
              oss_cmd="snyk test --all-projects --severity-threshold=low"
              while IFS= read -r f; do
                add_target "$f"
              done < <(find . -maxdepth 5 \
                \( -name package-lock.json -o -name yarn.lock -o -name pnpm-lock.yaml -o -name package.json \
                   -o -name requirements.txt -o -name 'requirements-*.txt' -o -name pyproject.toml \
                   -o -name Pipfile -o -name poetry.lock -o -name go.mod -o -name pom.xml \
                   -o -name build.gradle -o -name build.gradle.kts -o -name gradle.lockfile \
                   -o -name '*.csproj' -o -name '*.sln' -o -name Gemfile -o -name Cargo.toml \
                \) -print | sort | head -n 100)
            fi
          fi

          echo "has_target=${has_target}" >> "$GITHUB_OUTPUT"
          echo "oss_mode=${oss_mode}" >> "$GITHUB_OUTPUT"
          echo "skip_reason=${skip_reason}" >> "$GITHUB_OUTPUT"
          {
            echo 'oss_cmd<<EOF'
            echo "$oss_cmd"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Snyk OSS test
        id: oss
        if: ${{ steps.detect.outputs.has_target == 'true' }}
        shell: bash
        run: |
          set +e
          ${{ steps.detect.outputs.oss_cmd }} 2>&1 | tee artifacts/snyk-oss.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Snyk OSS skipped marker
        if: ${{ steps.detect.outputs.has_target != 'true' }}
        run: |
          printf '%s\n' 'OSS scan skipped: no supported manifest detected.' > artifacts/snyk-oss.log

      - name: Snyk code test
        id: code
        shell: bash
        run: |
          set +e
          snyk code test --severity-threshold=low 2>&1 | tee artifacts/snyk-code.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Enforce fail-closed Snyk policy
        if: ${{ always() }}
        env:
          HAS_TARGET: ${{ steps.detect.outputs.has_target }}
          OSS_MODE: ${{ steps.detect.outputs.oss_mode }}
          SKIP_REASON: ${{ steps.detect.outputs.skip_reason }}
          OSS_EXIT_CODE: ${{ steps.oss.outputs.exit_code }}
          CODE_EXIT_CODE: ${{ steps.code.outputs.exit_code }}
          SNYK_PROJECT_URL: ${{ env.SNYK_PROJECT_URL }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          from scripts.quality.snyk_policy import classify_scan, decide_policy

          detected_path = Path('artifacts/detected-targets.txt')
          detected = [line.strip() for line in detected_path.read_text(encoding='utf-8').splitlines() if line.strip()] if detected_path.exists() else []

          def _read_text(path: str) -> str:
              p = Path(path)
              if not p.exists():
                  return ''
              return p.read_text(encoding='utf-8', errors='ignore')

          has_target = os.getenv('HAS_TARGET', '').lower() == 'true'
          oss_mode = os.getenv('OSS_MODE') or ('executed' if has_target else 'skipped')
          skip_reason = os.getenv('SKIP_REASON', '')
          oss_log = _read_text('artifacts/snyk-oss.log')
          code_log = _read_text('artifacts/snyk-code.log')

          def _int_or_none(raw: str):
              raw = (raw or '').strip()
              if not raw:
                  return None
              try:
                  return int(raw)
              except ValueError:
                  return None

          oss_exit = _int_or_none(os.getenv('OSS_EXIT_CODE', ''))
          code_exit = _int_or_none(os.getenv('CODE_EXIT_CODE', ''))

          oss_outcome = classify_scan(executed=has_target, exit_code=oss_exit, log_text=oss_log)
          code_outcome = classify_scan(executed=True, exit_code=code_exit, log_text=code_log)
          policy = decide_policy(
              oss_outcome=oss_outcome,
              code_outcome=code_outcome,
              project_url=os.getenv('SNYK_PROJECT_URL', ''),
          )

          payload = {
              'oss_mode': oss_mode,
              'detected_targets': detected,
              'skip_reason': skip_reason,
              'oss_exit_code': oss_exit,
              'code_exit_code': code_exit,
              'oss_outcome': oss_outcome,
              'code_outcome': code_outcome,
              **policy,
          }

          out = Path('artifacts/snyk-oss-mode.json')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(payload, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          print(json.dumps(payload, indent=2))

          if policy['manual_retest_required']:
              print(policy['manual_retest_instruction'])

          if policy['decision'] != 'pass':
              raise SystemExit(1)
          PY

      - name: Upload Snyk mode artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: snyk-oss-mode
          path: |
            artifacts/snyk-oss-mode.json
            artifacts/detected-targets.txt
            artifacts/snyk-oss.log
            artifacts/snyk-code.log

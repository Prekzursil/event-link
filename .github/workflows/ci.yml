name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions: {}

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-
      - name: Install backend deps
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt lizard
      - name: Run backend tests
        run: |
          cd backend
          pytest --cov-report=xml:coverage.xml --cov-fail-under=100
      - name: Upload backend coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: error
      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Cache npm
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: |
            npm-
      - name: Install frontend deps
        run: |
          cd ui
          # --ignore-scripts: don't auto-run package lifecycle scripts on
          # install (githubactions:S6505 hotspot mitigation). The build
          # commands we need run via npm test / npm run build below.
          npm ci --ignore-scripts
      - name: Run frontend checks
        run: |
          cd ui
          npm test
      - name: Adjust lcov SF paths for SonarCloud
        # vitest's v8 coverage provider emits SF: lines relative to its cwd
        # (``ui/``), so an ``SF:src/components/Foo.tsx`` line ends up looking
        # for ``src/components/Foo.tsx`` at the SonarCloud project root —
        # which doesn't exist (the actual file is ``ui/src/components/Foo.tsx``).
        # Without this prefix step, SonarCloud's ``new_coverage`` quality-gate
        # condition sees ~65.9% instead of the actual 100% because some files
        # don't match. Prefixing each SF: line with ``ui/`` makes the paths
        # repo-root-relative, matching ``sonar.sources=ui/src``.
        run: |
          if [ -f ui/coverage/lcov.info ]; then
            sed -i 's|^SF:|SF:ui/|' ui/coverage/lcov.info
          fi
      - name: Upload frontend coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-coverage
          path: ui/coverage
          if-no-files-found: error
      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: ui/coverage/lcov.info,ui/coverage/cobertura-coverage.xml
          flags: ui
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  backend-integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eventlink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d eventlink_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-
      - name: Install backend deps
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Postgres integration tests
        env:
          DATABASE_URL: ${{ secrets.CI_TEST_DATABASE_URL }}
          SECRET_KEY: ${{ secrets.CI_TEST_SECRET_KEY }}
          EMAIL_ENABLED: "false"
          RUN_INTEGRATION_TESTS: "1"
        run: |
          cd backend
          pytest integration_tests --cov=app --cov-report=xml:coverage-integration.xml
      - name: Upload integration coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-integration-coverage
          path: backend/coverage-integration.xml
          if-no-files-found: error
      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: backend/coverage-integration.xml
          flags: backend-integration
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-compose:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Prepare env
        run: |
          # docker-compose.yml loads .env into the backend container
          cp .env.example .env
      - name: Build docker images
        run: |
          docker compose build
      - name: Compose up + smoke test
        run: |
          docker compose up -d --build

          echo "Waiting for backend health..."
          for i in {1..90}; do
            if curl -fsS "http://localhost:8000/api/health" >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS "http://localhost:8000/api/health"

          echo "Waiting for frontend..."
          for i in {1..90}; do
            if curl -fsS "http://localhost:4200/" >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS "http://localhost:4200/" >/dev/null
      - name: Dump docker logs
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color
      - name: Compose down
        if: always()
        run: |
          docker compose down -v

  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Cache npm
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: |
            npm-
      - name: Prepare env
        run: |
          # docker-compose.yml loads .env into the backend container
          cp .env.example .env
      - name: Compose up
        run: |
          docker compose up -d --build

          echo "Waiting for backend health..."
          for i in {1..90}; do
            if curl -fsS "http://localhost:8000/api/health" >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS "http://localhost:8000/api/health"

          echo "Waiting for frontend..."
          for i in {1..90}; do
            if curl -fsS "http://localhost:4200/" >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS "http://localhost:4200/" >/dev/null
      - name: Seed database
        run: |
          docker compose exec -T backend python seed_data.py
      - name: Install UI deps
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: |
          cd ui
          # --ignore-scripts: don't auto-run package lifecycle scripts on
          # install (githubactions:S6505 hotspot mitigation). The build
          # commands we need run via npm test / npm run build below.
          npm ci --ignore-scripts
      - name: Install Playwright (Chromium)
        run: |
          cd ui
          npx playwright install --with-deps chromium
      - name: Run Playwright E2E
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4200
        run: |
          cd ui
          npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: |
            ui/playwright-report
            ui/test-results
          if-no-files-found: ignore
      - name: Dump docker logs
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color
      - name: Compose down
        if: always()
        run: |
          docker compose down -v



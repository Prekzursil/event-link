version = 1

exclude_patterns = [
  "backend/integration_tests/**",
  "backend/tests/**",
  "ui/coverage/**",
  "ui/dist/**",
  "ui/e2e/**",
  "ui/src/components/ui/**",
  "ui/tests/**",
  "backend/.pytest_cache/**",
]

test_patterns = [
  "backend/tests/**",
  "backend/integration_tests/**",
  "ui/tests/**",
  "ui/e2e/**",
]

[[analyzers]]
name = "python"
enabled = true

  [analyzers.meta]
  runtime_version = "3.x.x"
  max_line_length = 180
  skip_doc_coverage = ["module", "magic", "init", "class", "nonpublic"]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  plugins = ["react"]
  dependency_file_paths = ["ui"]
  environment = ["nodejs", "browser", "vitest"]
  module_system = "es-modules"
  dialect = "typescript"
  skip_doc_coverage = [
    "arrow-function-expression",
    "class-declaration",
    "class-expression",
    "function-declaration",
    "function-expression",
    "method-definition",
  ]
